<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>蒲公英达人同步飞书</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="product-lockup">
          <span class="product-mark">SOLO专用</span>
          <div>
            <p class="eyebrow">达人数据工作台</p>
            <h1>蒲公英达人同步飞书</h1>
          </div>
        </div>
        <div class="badges">
          <span id="syncStateBadge" class="badge">同步未就绪</span>
          <span id="detailStateBadge" class="badge badge-alt">详情未就绪</span>
        </div>
      </header>

      <section class="band" data-index="01">
        <div class="section-head">
          <div>
            <h2>导出为表格</h2>
            <p class="hint">导出当前筛选条件下的达人为表格，勾选后会在导出完成后直接写回飞书。</p>
          </div>
        </div>
        <input id="pageSize" type="hidden" />
        <input id="maxRows" type="hidden" />
        <label class="inline">
          <input id="writeToFeishuOnExport" type="checkbox" />
          <span>导出后直接写回飞书</span>
        </label>
        <p id="exportHint" class="supporting"></p>
        <div class="actions collection-actions">
          <button id="exportBtn" type="button" class="primary">导出为表格</button>
          <button id="stopExportBtn" type="button" class="compact-stop" hidden>停止采集</button>
        </div>
      </section>

      <section class="band" data-index="02">
        <div class="section-head">
          <div>
            <h2>直采达人到飞书</h2>
          </div>
        </div>
        <div class="segmented" role="tablist" aria-label="同步来源">
          <button id="syncSourceCurrentBtn" type="button" class="seg active" aria-pressed="true">当前筛选</button>
          <button id="syncSourceImportedBtn" type="button" class="seg" aria-pressed="false">已下载表格</button>
        </div>
        <label id="csvRow" class="file-row hidden">
          <span>选择已下载达人 CSV</span>
          <input id="csvFile" type="file" accept=".csv,.txt,text/csv,text/plain" />
        </label>
        <div class="configured-table-picker">
          <label>
            <span>选择飞书配置页已配置表格</span>
            <select id="syncConfiguredTable">
              <option value="">暂无已配置表格</option>
            </select>
          </label>
          <button id="refreshSyncConfiguredTablesBtn" type="button" class="compact-button">刷新已配置表</button>
        </div>
        <p id="activeSyncTable" class="active-detail-table">当前生效：暂无已配置表格</p>
        <input id="feishuUrl" type="hidden" />
        <input id="feishuSheetId" type="hidden" />
        <div class="check-grid">
          <label class="inline">
            <input id="syncUpdateExisting" type="checkbox" />
            <span>重复达人更新已有行</span>
          </label>
          <label class="inline">
            <input id="syncUseFirstSheet" type="checkbox" disabled />
            <span>多子表未填 ID 时使用首个子表</span>
          </label>
        </div>
        <p id="syncHint" class="supporting"></p>
        <div class="actions">
          <button id="syncValidateBtn" type="button">检测写入</button>
          <button id="syncBtn" type="button" class="primary">直采达人到飞书</button>
        </div>
      </section>

      <section class="band" data-index="03">
        <div class="section-head">
          <div>
            <h2>达人补全和收藏配置</h2>
          </div>
        </div>
        <div class="configured-table-picker">
          <label>
            <span>选择飞书配置页已配置表格</span>
            <select id="detailConfiguredTable">
              <option value="">暂无已配置表格</option>
            </select>
          </label>
          <button id="openTableConfigBtn" type="button" class="compact-button">去配置表格</button>
          <button id="refreshConfiguredTablesBtn" type="button" class="compact-button">刷新已配置表</button>
        </div>
        <p id="activeDetailTable" class="active-detail-table">当前生效：暂无已配置表格</p>
        <input id="detailFeishuUrl" type="hidden" />
        <input id="detailFeishuSheetId" type="hidden" />
        <input id="collectionMode" type="hidden" />
        <input id="detailCaptureFansScreenshot" type="checkbox" hidden />
        <input id="detailCaptureNoteScreenshot" type="checkbox" hidden />
        <input id="detailLimit" type="hidden" />
        <input id="detailTraverseAllSheets" type="checkbox" hidden />
        <p id="detailHint" class="supporting" hidden></p>
        <div class="actions">
          <button id="detailValidateBtn" type="button">选定这个表</button>
          <button id="stopDetailBtn" type="button">停止补足</button>
          <button id="openFavoritesBtn" type="button">达人库</button>
          <button id="backfillBtn" type="button" class="primary">补足详情</button>
        </div>
      </section>

      <section class="band" data-index="04">
        <div class="section-head">
          <div>
            <h2>飞书配置</h2>
          </div>
        </div>
        <label>
          <span>飞书 App ID</span>
          <input id="feishuAppId" type="text" autocomplete="off" placeholder="cli_xxx" />
        </label>
        <label>
          <span>飞书 App Secret</span>
          <input id="feishuAppSecret" type="password" autocomplete="off" placeholder="仅保存在本机浏览器" />
        </label>
        <div class="actions">
          <button id="openOptionsBtn" type="button">打开设置页</button>
          <button id="saveBtn" type="button" class="primary">保存配置</button>
        </div>
      </section>

      <p id="status">先在蒲公英页面筛选达人，再导出、同步或补足详情。</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
