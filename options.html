<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>蒲公英达人同步飞书 - 飞书配置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="settings">
      <header class="topbar">
        <div class="product-lockup">
          <span class="product-mark">SOLO专用</span>
          <div>
            <p class="eyebrow">系统配置中心</p>
            <h1>蒲公英达人同步飞书</h1>
          </div>
        </div>
        <p class="note top-note">本机安全存储 · 仅供插件访问飞书</p>
      </header>

      <section class="band status-band">
        <h2>当前配置状态</h2>
        <div class="status-grid">
          <div class="status-item">
            <span>扩展 ID</span>
            <strong id="extensionId">-</strong>
          </div>
          <div class="status-item">
            <span>飞书 App ID</span>
            <strong id="appIdState">未填写</strong>
          </div>
          <div class="status-item">
            <span>同步设置</span>
            <strong id="syncTargetState">未检测</strong>
          </div>
        </div>
      </section>

      <section class="band">
        <h2>飞书配置</h2>
        <label>
          <span>飞书 App ID</span>
          <input id="feishuAppId" type="text" autocomplete="off" placeholder="cli_xxx" />
        </label>
        <label>
          <span>飞书 App Secret</span>
          <input id="feishuAppSecret" type="password" autocomplete="off" placeholder="仅保存在本机浏览器" />
        </label>
      </section>

      <section class="band">
        <div class="section-title-row">
          <h2>表格配置</h2>
          <button id="addTableConfigBtn" type="button" class="secondary compact">新增表格</button>
        </div>
        <div id="tableConfigList" class="table-config-list"></div>
        <p class="note">新增后请先检测链接，再选择子表；选择完成后可单独保存该表配置，并将其中一个设为默认写入表。</p>
      </section>

      <section class="band">
        <h2>默认采集模式</h2>
        <label>
          <span>仅导出 CSV 时</span>
          <select id="collectionMode">
            <option value="detail">全采集：列表后补采达人详情</option>
            <option value="fast">快速采集：只采集找博主列表接口</option>
          </select>
        </label>
        <label class="inline">
          <input id="detailCaptureFansScreenshot" type="checkbox" />
          <span>全采集时写入粉丝画像截图</span>
        </label>
        <label class="inline">
          <input id="detailCaptureNoteScreenshot" type="checkbox" />
          <span>全采集时写入笔记数据截图</span>
        </label>
        <p class="note">写入飞书前会先识别目标表字段并自动决定模式：存在详情或截图字段时全采集，否则快速采集。这里的设置仅用于不写入飞书的 CSV 导出。</p>
      </section>

      <div hidden>
        <input id="feishuUrl" type="hidden" />
        <input id="feishuSheetId" type="hidden" />
        <input id="detailFeishuUrl" type="hidden" />
        <input id="detailFeishuSheetId" type="hidden" />
        <input id="pageSize" type="hidden" />
        <input id="maxRows" type="hidden" />
        <input id="detailLimit" type="hidden" />
        <input id="detailTraverseAllSheets" type="checkbox" />
        <input id="syncUpdateExisting" type="checkbox" />
        <input id="syncUseFirstSheet" type="checkbox" />
      </div>

      <div class="actions">
        <button id="openFavoritesBtn" type="button" class="secondary">打开预收藏达人</button>
        <button id="checkSyncBtn" type="button" class="secondary">检测同步设置</button>
        <button id="saveBtn" type="button">保存设置</button>
      </div>
      <p id="status">设置会保存在当前 Chrome 扩展实例里。卸载重装后需要重新填写。</p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
