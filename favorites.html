<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>蒲公英预收藏后台</title>
    <link rel="stylesheet" href="favorites.css" />
  </head>
  <body>
    <main class="favorites-shell">
      <header class="topbar">
        <div class="product-lockup">
          <span class="product-mark">SOLO专用</span>
          <div>
            <p class="eyebrow">达人候选数据库</p>
            <h1>预收藏达人库</h1>
          </div>
        </div>
        <div class="actions">
          <button id="refreshBtn" type="button">刷新</button>
          <button id="clearBtn" type="button" class="danger">清空</button>
        </div>
      </header>

      <section class="summary">
        <div>
          <span>预收藏达人</span>
          <strong id="favoriteCount">0</strong>
        </div>
        <p id="status">从小红书或蒲公英达人主页点击“预收藏”后，会显示在这里。</p>
      </section>

      <section class="data-panel" aria-labelledby="dataPanelTitle">
        <div class="data-panel-copy">
          <p class="eyebrow">DATA DESK</p>
          <h2 id="dataPanelTitle">达人库数据工具</h2>
          <p>导入会按达人 ID 合并，保留已有飞书写回记录；全量更新会重新获取粉丝量、赞藏与最新报价。</p>
        </div>
        <div class="data-actions">
          <button id="exportBtn" type="button">导出 Excel</button>
          <label class="file-button" for="importFile">导入表格</label>
          <input id="importFile" type="file" accept=".xlsx,.csv,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" hidden />
          <button id="updateAllBtn" type="button" class="primary">更新达人信息</button>
        </div>
        <div class="online-import">
          <label for="onlineTableUrl">在线表格地址</label>
          <div>
            <input id="onlineTableUrl" type="url" placeholder="飞书表格链接，或公开 CSV / Google Sheets 链接" />
            <button id="importOnlineBtn" type="button">读取并导入</button>
          </div>
        </div>
        <div id="dataProgress" class="data-progress" hidden>
          <div><span id="dataProgressLabel">准备中...</span><strong id="dataProgressValue">0%</strong></div>
          <progress id="dataProgressBar" max="100" value="0"></progress>
        </div>
      </section>

      <section class="filter-panel">
        <div class="filter-row">
          <label class="search-field">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="昵称、红书号、地区、简介" />
          </label>
          <label class="status-field">
            <span>飞书状态</span>
            <select id="statusFilter">
              <option value="">全部飞书状态</option>
              <option value="never">未写回过</option>
              <option value="any">已写回过任意表格</option>
            </select>
          </label>
        </div>
        <div class="category-filter">
          <span>内容类目</span>
          <div id="categoryFilters" class="category-chips"></div>
        </div>
      </section>

      <section class="write-panel">
        <label class="check-row">
          <input id="selectAll" type="checkbox" />
          <span>全选当前筛选结果</span>
        </label>
        <div class="write-target">
          <label>
            <span>写入已配置表格</span>
            <select id="favoriteConfiguredTable">
              <option value="">暂无已配置表格</option>
            </select>
          </label>
          <p id="activeWriteTarget" class="active-write-target">当前生效：暂无可写入表格</p>
        </div>
        <div class="write-actions">
          <span id="selectedCount">已选 0 位</span>
          <button id="writeFeishuBtn" type="button" class="primary" disabled>写入飞书表格</button>
        </div>
      </section>

      <section id="favoriteList" class="favorite-list"></section>
    </main>
    <script src="favorites-data.js"></script>
    <script src="favorites.js"></script>
  </body>
</html>
